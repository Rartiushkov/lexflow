      <a href="cases.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg>Cases</a>
      <a href="documents.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h7l3 3v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M10 2v3h3"/></svg>Intake</a>
      <a href="invoices.html" class="nav-item active"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>Invoices</a>
      <a href="invoice-builder.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M5 7h6M5 10h4"/><circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg>Invoice Builder</a>
      <span class="nav-section-label">Account</span>
      <a href="settings.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>Settings</a>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-initials">?</div>
        <div class="user-info"><div class="user-name" id="user-name">—</div><div class="user-role" id="user-email">—</div></div>
        <button id="btn-signout" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 3H3a1 1 0 00-1 1v8a1 1 0 001 1h3M10 5l4 3-4 3M6 8h8"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-breadcrumb"><span>Workspace</span><span class="sep">/</span><strong>Invoices</strong></div>
      <div class="topbar-actions">
        <a href="invoice.html?action=new" class="btn btn-primary">+ New invoice</a>
      </div>
    </div>
    <div class="page-content" data-view-hydrate>
      <div class="page-header">
        <div>
          <div class="page-title">Invoices</div>
          <div class="page-subtitle">Strict billing workspace with editable drafts and opened records.</div>
        </div>
      </div>

      <div class="card invoices-list-card">
        <div class="invoice-table invoice-table-head">
          <span>Number</span>
          <span>Client</span>
          <span>Status</span>
          <span>Total</span>
          <span>Issue</span>
          <span>Due</span>
          <span>Due risk</span>
        </div>
        <div id="invoice-list"></div>
      </div>
    </div>
  </div>

  <script src="./app.js?v=21"></script>
  <script>
    function renderInvoices() {
      const list = document.getElementById('invoice-list');
      const invoices = getInvoices();
      list.innerHTML = invoices.map(invoice => `
        <a class="invoice-table invoice-row-link" href="invoice.html?id=${invoice.id}">
          <span><strong>${invoice.number}</strong></span>
          <span>${invoice.client_name}</span>
          <span><span class="badge ${invoiceStatusBadge(invoice.status)}">${invoice.status}</span></span>
          <span>${formatCurrency(calculateInvoiceTotal(invoice), invoice.currency || 'EUR')}</span>
          <span>${formatDate(invoice.issue_date)}</span>
          <span>${formatDate(invoice.due_date)}</span>
          <span><span class="badge ${invoiceDueState(invoice).className}">${invoiceDueState(invoice).label}</span></span>
        </a>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      renderInvoices();
      setViewHydrated();
      await requireAuth();
      renderInvoices();
      setViewHydrated();
    });
  </script>
</body>
</html>
