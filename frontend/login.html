<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LexFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=13" />
</head>
<body class="auth auth-loading" data-api-base="https://lexflow-backend-y6m3.onrender.com">
  <div class="auth-loading-screen" id="auth-loading-screen" aria-live="polite">
    <span class="brand-mark auth-loading-mark">Lf</span>
    <div class="auth-loading-title" id="auth-loading-title">Opening workspace</div>
    <div class="auth-loading-copy" id="auth-loading-copy">Checking your session and preparing sign-in.</div>
  </div>
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:20px;">
      <span class="brand-mark" style="margin:0 auto 12px;display:inline-flex;">Lf</span>
      <h1 class="auth-title">Lawyer workspace</h1>
      <p class="auth-subtitle">Sign in to manage cases, documents, and billing.</p>
    </div>

    <button class="btn btn-google" id="btn-google" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <div class="auth-divider"><span>or use email</span></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" id="email" type="email" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary" style="width:100%;" type="submit">Sign in</button>
    </form>

    <div class="auth-error" id="auth-error"></div>

    <p class="auth-footer">
      Google login is recommended for staff. Email/password stays available as fallback.<br>
      <a href="login.html?switch=1" style="color:var(--navy);">Use another account</a><br>
      <a href="index.html" style="color:var(--navy);">Back to landing</a>
    </p>
  </div>

  <script src="./app.js?v=12"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const googleBtn = document.getElementById('btn-google');
      const errorBox = document.getElementById('auth-error');
      const loadingTitle = document.getElementById('auth-loading-title');
      const loadingCopy = document.getElementById('auth-loading-copy');
      const setAuthLoading = (active, title = 'Opening workspace', copy = 'Checking your session and preparing sign-in.') => {
        document.body.classList.toggle('auth-loading', active);
        loadingTitle.textContent = title;
        loadingCopy.textContent = copy;
      };
      const showError = (message) => {
        errorBox.textContent = message;
        errorBox.classList.add('visible');
      };
      const clearError = () => {
        errorBox.textContent = '';
        errorBox.classList.remove('visible');
      };

      if (params.get('switch') === '1') {
        await resetAllSessions();
        params.delete('switch');
        const next = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ''}`;
        window.history.replaceState({}, document.title, next);
      }

      if (isEmbeddedBrowser()) {
        showError('If Google sign-in stalls in an in-app browser, open this page in Chrome or Safari and try again.');
      }

      if (hasPendingOAuthRedirect()) {
        googleBtn.disabled = true;
        googleBtn.classList.add('is-loading');
        setAuthLoading(true, 'Completing sign-in', 'Restoring your Google session and opening the workspace.');
      }

      await requireGuest();
      const oauthUser = await syncSessionFromSupabase();
      if (oauthUser) {
        setAuthLoading(true, 'Opening workspace', 'Your account is ready. Redirecting now.');
        showToast('Signed in with Google', 'success');
        window.location.href = 'dashboard.html';
        return;
      }
      setAuthLoading(false);

      googleBtn.addEventListener('click', async () => {
        clearError();
        googleBtn.disabled = true;
        googleBtn.classList.add('is-loading');
        setAuthLoading(true, 'Redirecting to Google', 'Choose your account to continue into LexFlow.');
        try {
          await startGoogleLogin();
        } catch (err) {
          googleBtn.disabled = false;
          googleBtn.classList.remove('is-loading');
          setAuthLoading(false);
          showError(err.message || 'Google sign-in failed.');
        }
      });

      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearError();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        setAuthLoading(true, 'Signing in', 'Verifying your credentials and loading the workspace.');
        try {
          const data = await post('/api/auth/login', { email, password });
          setSession(data.token, data.user);
          showToast('Welcome back', 'success');
          window.location.href = 'dashboard.html';
        } catch (err) {
          setAuthLoading(false);
          showError(err.message || 'Sign-in failed.');
        }
      });
    });
  </script>
</body>
</html>
