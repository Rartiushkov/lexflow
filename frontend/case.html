<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexFlow — Case detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=6" />
</head>
<body class="dashboard" data-api-base="https://lexflow-backend-y6m3.onrender.com">
  <aside class="sidebar">
    <a href="/index.html" class="sidebar-brand">
      <span class="brand-mark" style="width:28px;height:28px;font-size:13px;">Lf</span>
      <span class="brand-name">LexFlow</span>
    </a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Workspace</span>
      <a href="dashboard.html" class="nav-item">Dashboard</a>
      <a href="cases.html" class="nav-item">Cases</a>
      <a href="documents.html" class="nav-item">Intake</a>
      <a href="invoices.html" class="nav-item">Invoices</a>
      <span class="nav-section-label">Account</span>
      <a href="settings.html" class="nav-item">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-initials">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">—</div>
          <div class="user-role" id="user-email">—</div>
        </div>
        <button id="btn-signout" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 3H3a1 1 0 00-1 1v8a1 1 0 001 1h3M10 5l4 3-4 3M6 8h8"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-breadcrumb">
        <span>Cases</span>
        <span class="sep">/</span>
        <a href="cases.html" style="color:var(--muted);">Cases</a>
        <span class="sep">/</span>
        <strong id="breadcrumb-name">Case</strong>
      </div>
      <div class="topbar-actions">
        <a href="dashboard.html" class="btn btn-outline">Back</a>
      </div>
    </div>

    <div class="page-content">
      <div class="page-header">
        <div>
          <div class="page-title" id="case-title">Case</div>
          <div class="page-subtitle" id="case-meta">Loading…</div>
        </div>
        <div style="display:flex;gap:10px;">
          <span class="badge badge-gray" id="case-status">Unknown</span>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">
        <div class="card">
          <div class="card-header">
            <span class="card-title">Documents</span>
            <span class="badge badge-blue" id="doc-count">0</span>
          </div>
          <div class="card-body">
            <div style="margin-bottom:16px;">
              <input type="file" id="file-input" multiple accept=".pdf,image/*" style="display:none;" />
              <button class="btn btn-outline btn-sm" id="btn-upload">+ Upload document</button>
            </div>
            <div id="doc-list">
              <p style="color:var(--muted);">No documents uploaded yet.</p>
            </div>
          </div>
        </div>

        <div>
          <div class="card" style="margin-bottom:24px;">
            <div class="card-header">
              <span class="card-title">Client portal</span>
            </div>
            <div class="card-body">
              <div id="portal-block">
                <p style="color:var(--muted);margin-bottom:12px;">Case link will appear after load.</p>
              </div>
            </div>
          </div>

          <div class="card" style="margin-bottom:24px;">
            <div class="card-header">
              <span class="card-title">Invoice</span>
            </div>
            <div class="card-body">
              <div id="invoice-block">
                <p style="color:var(--muted);margin-bottom:12px;">Invoice not yet generated.</p>
                <button class="btn btn-primary btn-sm" id="btn-invoice">Open builder</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <span class="card-title">Actions</span>
            </div>
            <div class="card-body">
              <button class="btn btn-outline btn-sm" style="width:100%;margin-bottom:10px;" id="btn-run-ai">Extract fields</button>
              <button class="btn btn-outline btn-sm" style="width:100%;margin-bottom:10px;" id="btn-download">Download PDF form</button>
              <button class="btn btn-primary btn-sm" style="width:100%;" id="btn-advance">Advance stage</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js?v=6"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const caseId = params.get('id') || '1';

    async function loadCase() {
      try {
        const c = await get(`/api/cases/${caseId}`);
        render(c);
      } catch (err) {
        showToast(err.message || 'Unable to load case', 'error');
        document.getElementById('case-title').textContent = 'Case unavailable';
        document.getElementById('breadcrumb-name').textContent = 'Case';
        document.getElementById('case-meta').textContent = 'This case could not be loaded.';
        document.getElementById('doc-list').innerHTML = `<p style="color:var(--muted);">No case data available.</p>`;
        document.getElementById('portal-block').innerHTML = `<p style="color:var(--muted);">Portal link unavailable.</p>`;
      }
    }

    function copyPortalLink(url) {
      navigator.clipboard.writeText(url).then(() => showToast('Portal link copied', 'success'));
    }

    function render(c) {
      document.getElementById('case-title').textContent = c.client_name;
      document.getElementById('breadcrumb-name').textContent = c.client_name;
      document.getElementById('case-meta').textContent = `${c.case_type} · ${c.destination} · created ${formatDate(c.created_at)}`;
      const portalUrl = c.portal_url || `${window.location.origin}/client-upload.html?id=${c.id}`;
      document.getElementById('portal-block').innerHTML = `
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Share this link with the client if they need to upload documents again.</div>
        <div class="form-input" style="margin-bottom:10px;word-break:break-all;">${portalUrl}</div>
        <button class="btn btn-outline btn-sm" type="button" id="btn-copy-portal-link">Copy link</button>
      `;
      document.getElementById('btn-copy-portal-link')?.addEventListener('click', () => copyPortalLink(portalUrl));
      const statusMap = {
        documents: 'badge-gray',
        payment: 'badge-yellow',
        processing: 'badge-blue',
        review: 'badge-yellow',
        submitted: 'badge-green',
      };
      const statusEl = document.getElementById('case-status');
      statusEl.className = `badge ${statusMap[c.stage] || 'badge-gray'}`;
      statusEl.textContent = c.stage;

      const list = document.getElementById('doc-list');
      const incomingDocs = getDocumentsForCase(c.id);
      const mergedDocs = [...(c.docs || []), ...incomingDocs.map(d => ({
        id: d.id,
        document_id: d.id,
        key: d.key || '',
        name: d.name,
        status: 'attached',
        uploaded_at: d.uploaded_at,
        data_url: d.data_url || d.url,
      }))];
      document.getElementById('doc-count').textContent = mergedDocs.length;
      if (mergedDocs.length) {
        list.innerHTML = mergedDocs.map(d => `
          <div class="table-row case-doc-row">
            <div>${d.data_url || d.url ? `<a href="${d.data_url || d.url}" download="${d.name}"><strong>${d.name}</strong></a>` : `<strong>${d.name}</strong>`}</div>
            <div>${formatDate(d.uploaded_at)}</div>
            <div><span class="badge badge-green">${d.status}</span></div>
            <div><button class="btn btn-outline btn-sm" type="button" data-delete-case-doc="${d.document_id || d.key || d.id || d.name}">Delete</button></div>
          </div>
        `).join('');
        list.querySelectorAll('[data-delete-case-doc]').forEach(button => {
          button.addEventListener('click', async () => {
            const ref = button.dataset.deleteCaseDoc;
            try {
              if (ref.startsWith('doc-')) {
                await deleteDocumentRemote(ref);
              } else {
                await api('DELETE', `/api/cases/${caseId}/documents/${encodeURIComponent(ref)}`);
              }
              showToast('Document deleted', 'success');
            } catch {
              deleteIncomingDocumentLocal(ref);
              showToast('Document deleted locally', 'success');
            }
            loadCase();
          });
        });
      } else {
        list.innerHTML = `<p style="color:var(--muted);">No documents uploaded yet.</p>`;
      }

      if (c.invoice) {
        document.getElementById('invoice-block').innerHTML = `
          <div style="font-size:24px;font-weight:700;margin-bottom:6px;">${formatCurrency(c.invoice.amount)}</div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">${c.invoice.number}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <span class="badge ${c.invoice_paid ? 'badge-green' : 'badge-yellow'}">${c.invoice_paid ? 'Paid' : 'Awaiting payment'}</span>
            <a class="btn btn-outline btn-sm" href="invoice.html?id=${c.invoice.id || c.invoice.number}">Open</a>
          </div>
        `;
      } else {
        const localInvoice = getInvoices().find(invoice => invoice.case_id === c.id);
        if (localInvoice) {
          document.getElementById('invoice-block').innerHTML = `
            <div style="font-size:24px;font-weight:700;margin-bottom:6px;">${formatCurrency(calculateInvoiceTotal(localInvoice), localInvoice.currency || 'EUR')}</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">${localInvoice.number}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
              <span class="badge ${invoiceStatusBadge(localInvoice.status)}">${localInvoice.status}</span>
              <a class="btn btn-outline btn-sm" href="invoice.html?id=${localInvoice.id}">Open</a>
            </div>
          `;
        }
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
        loadCase();
        const input = document.getElementById('file-input');
      document.getElementById('btn-upload')?.addEventListener('click', () => input.click());
      input?.addEventListener('change', async () => {
        for (const file of input.files) {
          try { await upload(`/api/cases/${caseId}/upload`, file); showToast(`${file.name} uploaded`, 'success'); }
          catch { showToast(`${file.name} upload failed`, 'error'); }
        }
        loadCase();
      });
      document.getElementById('btn-invoice')?.addEventListener('click', async () => {
        window.location.href = `invoice.html?case=${caseId}`;
      });
      document.getElementById('btn-run-ai')?.addEventListener('click', async () => {
        try { await post(`/api/cases/${caseId}/parse`, {}); showToast('Fields extracted', 'success'); loadCase(); }
        catch { showToast('Extraction failed', 'error'); }
      });
      document.getElementById('btn-download')?.addEventListener('click', () => {
        window.open(`${API_BASE}/api/cases/${caseId}/form`, '_blank');
      });
      document.getElementById('btn-advance')?.addEventListener('click', async () => {
        try { await post(`/api/cases/${caseId}/advance`, {}); showToast('Stage advanced', 'success'); loadCase(); }
        catch { showToast('Stage advanced (demo)', 'success'); }
      });
    });
  </script>
</body>
</html>
