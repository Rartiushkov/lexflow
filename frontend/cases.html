<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexFlow — Cases</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=16" />
</head>
<body class="dashboard" data-api-base="https://lexflow-backend-y6m3.onrender.com">
  <aside class="sidebar">
    <a href="/index.html" class="sidebar-brand"><span class="brand-mark" style="width:28px;height:28px;font-size:13px;">Lf</span><span class="brand-name">LexFlow</span></a>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Workspace</span>
      <a href="dashboard.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard</a>
      <a href="cases.html" class="nav-item active"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/></svg>Cases</a>
      <a href="documents.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2h7l3 3v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M10 2v3h3"/></svg>Intake</a>
      <a href="invoices.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1"/><path d="M5 5h6M5 8h6M5 11h3"/></svg>Invoices</a>
      <a href="invoice-builder.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M5 7h6M5 10h4"/><circle cx="12" cy="6" r="1.5" fill="currentColor" stroke="none"/></svg>Invoice Builder</a>
      <span class="nav-section-label">Account</span>
      <a href="settings.html" class="nav-item"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg>Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="user-initials">?</div>
        <div class="user-info"><div class="user-name" id="user-name">—</div><div class="user-role" id="user-email">—</div></div>
        <button id="btn-signout" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 3H3a1 1 0 00-1 1v8a1 1 0 001 1h3M10 5l4 3-4 3M6 8h8"/></svg></button>
      </div>
    </div>
  </aside>

  <div class="dashboard-main">
    <div class="dashboard-topbar">
      <div class="topbar-breadcrumb"><span>Workspace</span><span class="sep">/</span><strong>Cases</strong></div>
      <div class="topbar-actions"><a href="new-case.html" class="btn btn-primary">+ New case</a></div>
    </div>
    <div class="page-content">
      <div class="page-header"><div><div class="page-title">All cases</div><div class="page-subtitle">Compact list of open and completed work.</div></div></div>
      <div class="card">
        <div class="table-row header"><span>Client</span><span>Type</span><span>Country</span><span>Workflow</span><span>Priority</span><span>Date</span></div>
        <div id="cases-list"></div>
      </div>
    </div>
  </div>

  <script src="./app.js?v=15"></script>
  <script>
    function priorityBadge(priority) {
      const map = {
        high: 'badge-red',
        medium: 'badge-yellow',
        low: 'badge-green',
      };
      return map[priority] || 'badge-gray';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
      const list = document.getElementById('cases-list');
      try {
        const cases = await get('/api/cases');
        setCaseDirectory(cases);
        list.innerHTML = cases.map(c => `
          <div class="table-row clickable case-list-row case-list-row-${(c.priority || c.control_state?.auto_priority || 'medium').toLowerCase()}" onclick="window.location='case.html?id=${c.id}'">
            <span><strong>${c.client_name}</strong></span>
            <span>${c.case_type}</span>
            <span>${c.destination}</span>
            <span><span class="badge badge-${c.stage === 'submitted' ? 'green' : c.stage === 'payment' ? 'yellow' : 'blue'}">${c.stage}</span></span>
            <span><span class="badge ${priorityBadge((c.priority || c.control_state?.auto_priority || 'medium').toLowerCase())}">${(c.priority || c.control_state?.auto_priority || 'medium').toLowerCase()}</span></span>
            <span>${formatDate(c.created_at)}</span>
          </div>
        `).join('');
      } catch (err) {
        list.innerHTML = `<div class="table-row"><span>Unable to load cases.</span><span></span><span></span><span></span><span></span><span></span></div>`;
      }
    });
  </script>
</body>
</html>
